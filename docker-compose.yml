version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: server_scrapiz_api
    volumes:
      - ./server:/app
      - static_volume:/static
      - media_volume:/media
    expose:
      - "8000"
    networks:
      - templet

  nginx:
    image: nginx:alpine
    container_name: nginx_scrapiz
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
      - media_volume:/media
    depends_on:
      - server
    networks:
      - templet

networks:
  templet:
    driver: bridge

volumes:
  static_volume:
  media_volume:
