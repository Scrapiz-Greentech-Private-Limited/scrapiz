version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: server_scrapiz_api
    volumes:
      - ./server:/app
      - static_volume:/static
      - media_volume:/media
    expose:
      - "8000"
    depends_on:
      - redis
    networks:
      - templet
    env_file:
      - ./server/.env

  redis:
    image: redis:7-alpine
    container_name: redis_scrapiz
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - templet
    command: redis-server --appendonly yes

  celery_worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: celery_worker_scrapiz
    command: celery -A server worker -l info
    volumes:
      - ./server:/app
    depends_on:
      - redis
      - server
    networks:
      - templet
    env_file:
      - ./server/.env

  celery_beat:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: celery_beat_scrapiz
    command: celery -A server beat -l info
    volumes:
      - ./server:/app
    depends_on:
      - redis
      - server
    networks:
      - templet
    env_file:
      - ./server/.env

  nginx:
    image: nginx:alpine
    container_name: nginx_scrapiz
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
      - media_volume:/media
    depends_on:
      - server
    networks:
      - templet

networks:
  templet:
    driver: bridge

volumes:
  static_volume:
  media_volume:
  redis_data:
