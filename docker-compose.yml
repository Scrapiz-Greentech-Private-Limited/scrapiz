

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: server_scrapiz_api
    command: sh -c "python manage.py migrate && 
                   python manage.py collectstatic --noinput && 
                   gunicorn server.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    volumes:
      - ./server:/app
      - static_volume:/static
      - media_volume:/media
    ports:
      - "8000:8000"
    depends_on:
      - redis
    networks:
      - templet
    env_file:
      - ./server/.env

  redis:
    image: redis:7-alpine
    container_name: redis_scrapiz
    # Redis serves as the message broker for Celery tasks
    # Used for push notification task queue and results backend
    expose:
      - "6379"
    networks:
      - templet

  celery_worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: celery_worker_scrapiz
    # Celery worker handles async tasks including push notifications
    # -c 2 = 2 concurrent workers for handling multiple tasks
    command: celery -A server worker -l info -c 2
    volumes:
      - ./server:/app
    depends_on:
      - redis
      - server
    networks:
      - templet
    env_file:
      - ./server/.env

  celery_beat:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: celery_beat_scrapiz
    command: celery -A server beat -l info --scheduler django_celery_beat.schedulers.DatabaseScheduler
    volumes:
      - ./server:/app
    depends_on:
      - redis
      - server
    networks:
      - templet
    env_file:
      - ./server/.env



networks:
  templet:
    driver: bridge

volumes:
  static_volume:
  media_volume:
  redis_data:

